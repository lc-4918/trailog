name: Build & Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*'

jobs:
  debug:
    name: Build debug APK
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: trailog-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk

  release:
    name: Build & publish signed release APK
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install NDK
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973"

      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Clean up keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/*.apk

      # Manifeste lu par l'app pour se savoir perimee (cf. update/UpdateManager). Publie sur main plutot
      # que sur une branche dediee : servi par raw.githubusercontent.com, sans quota, contrairement a
      # l'API GitHub (60 requetes/h par IP). Un push par GITHUB_TOKEN ne redeclenche aucun workflow, donc
      # pas de boucle avec le job debug qui ecoute toutes les branches.
      - name: Publish latest-release.json on main
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # versionCode : meme calcul que build.gradle.kts (maj*10000 + min*100 + patch), c'est lui que
          # l'app compare. Les deux doivent rester d'accord.
          VERSION="${TAG#v}"
          IFS='.' read -r MAJ MIN PATCH <<< "$VERSION"
          VERSION_CODE=$(( MAJ * 10000 + MIN * 100 + PATCH ))
          # Nom d'APK fixe par androidComponents dans build.gradle.kts : trailog-<tag>.apk
          APK_URL="${{ github.server_url }}/${{ github.repository }}/releases/download/${TAG}/trailog-${TAG}.apk"
          # Le nom du fichier publie doit exister, sinon l'app telechargerait une URL morte.
          test -f "app/build/outputs/apk/release/trailog-${TAG}.apk"

          git fetch origin main
          git checkout main
          jq -n --arg v "$VERSION" --argjson c "$VERSION_CODE" \
                --arg d "$(date -u +%Y-%m-%d)" --arg u "$APK_URL" \
                '{version:$v, versionCode:$c, releaseDate:$d, apkUrl:$u, changelog:""}' \
            > latest-release.json
          cat latest-release.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest-release.json
          # Rien a faire si le manifeste est deja a jour (re-run du workflow sur le meme tag).
          git diff --staged --quiet || {
            git commit -m "chore: latest-release.json pour ${TAG}"
            git push origin main
          }
